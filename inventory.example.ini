# Example inventory — copy to inventory.ini and edit for your environment.
#
#   cp inventory.example.ini inventory.ini
#   ansible-vault encrypt inventory.ini        # if it contains secrets
#
# ansible.cfg already points at ./inventory.ini by default.

[webservers]
# Replace these with your own hosts. Use FQDNs or IPs.
# server1 ansible_host=192.0.2.10 ansible_user=ubuntu
# server2 ansible_host=192.0.2.11 ansible_user=ubuntu

[database]
# db1 ansible_host=192.0.2.20 ansible_user=ubuntu

[loadbalancer]
# lb1 ansible_host=192.0.2.30 ansible_user=ubuntu

[production:children]
webservers
database
loadbalancer

[staging:children]
webservers

# Per-group / per-host variables belong in:
#   group_vars/<group>.yml
#   host_vars/<host>.yml
